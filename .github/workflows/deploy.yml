name: Despliegue Automático al VPS

# Esto le dice al robot que actúe solo cuando subas cambios a la rama 'main'
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Conectarse al VPS y actualizar
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        # Aquí van los comandos que el robot escribirá en tu terminal
        script: |
          cd ~/mi_servidor_videos
          git pull origin main
          pm2 restart servidor-videos